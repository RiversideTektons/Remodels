<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Remodel Portfolio</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.project-container {
  position: relative;
  max-width: 700px;
  margin: auto 0 40px;
  overflow: hidden;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  height: 400px;
}

/* Images stacked */
.project-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
}

#beforeImage {
  z-index: 2;
  width: 100%;
  transition: width 5s linear; /* Slow 5s transition for slider */
}

#afterImage {
  z-index: 1;
}

input[type="range"] {
  width: 90%;
  margin-top: 10px;
  -webkit-appearance: none;
  height: 5px;
  border-radius: 5px;
  background: #ccc;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #333;
  cursor: pointer;
}

.slider-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-weight: bold;
}

/* Fade between projects */
.fade-project {
  opacity: 0;
  transition: opacity 1s ease;
}
.fade-project.show {
  opacity: 1;
}
</style>
</head>
<body>

<h1>Interactive Remodel Portfolio</h1>

<div class="project-container fade-project show" id="project">
  <img src="project1-after.jpg" id="afterImage" alt="After Remodel">
  <img src="project1-before.jpg" id="beforeImage" alt="Before Remodel">
</div>

<div class="slider-labels">
  <span>Before</span>
  <span>After</span>
</div>

<input type="range" min="0" max="100" value="100" id="slider">

<script>
// --- Projects Configuration ---
const projects = [
  {before:"project1-before.jpg", after:"project1-after.jpg"},
  {before:"project2-before.jpg", after:"project2-after.jpg"},
  {before:"project3-before.jpg", after:"project3-after.jpg"}
];

let currentProject = 0;
let autoSlide = true;

// --- DOM Elements ---
const beforeImage = document.getElementById('beforeImage');
const afterImage = document.getElementById('afterImage');
const slider = document.getElementById('slider');
const projectDiv = document.getElementById('project');

// --- Slider Control ---
slider.addEventListener('input', () => {
  const val = slider.value;
  beforeImage.style.width = val + "%";
  autoSlide = false; // Pause auto-slide while dragging
});

// --- Show a Project ---
function showProject(index) {
  // Fade out
  projectDiv.classList.remove('show');

  setTimeout(() => {
    beforeImage.src = projects[index].before;
    afterImage.src = projects[index].after;
    beforeImage.style.width = "100%";
    slider.value = 100;

    // Fade in
    projectDiv.classList.add('show');

    // Resume autoSlide after fade
    autoSlide = true;
  }, 1000); // match fade-out duration
}

// --- Auto Reveal ---
function autoAdvance() {
  if (!autoSlide) return;

  let val = 100; // start fully covering
  const step = 100 / (5*20); // 5 seconds, 50ms interval → 100 steps

  const interval = setInterval(() => {
    if (!autoSlide) { clearInterval(interval); return; }
    val -= step;
    if (val <= 0) {
      val = 0;
      clearInterval(interval);
      setTimeout(() => {
        currentProject = (currentProject + 1) % projects.length;
        showProject(currentProject);
      }, 1000); // wait 1s before next project fade
    }
    slider.value = val;
    beforeImage.style.width = val + "%";
  }, 50);
}

// --- Start Slideshow ---
showProject(currentProject);
setInterval(autoAdvance, 7000); // every 7s start automatic reveal (5s reveal + 2s buffer)
</script>

</body>
</html>
