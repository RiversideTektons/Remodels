<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before/After Remodel</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.project-container {
  position: relative;
  max-width: 700px;
  margin: auto;
  overflow: hidden;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  height: 400px;
}

.project-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
}

#beforeImage {
  z-index: 2;
  width: 100%;
  transition: width 5s linear; /* 5-second reveal */
}

#afterImage {
  z-index: 1;
}

input[type="range"] {
  width: 90%;
  margin-top: 10px;
  -webkit-appearance: none;
  height: 5px;
  border-radius: 5px;
  background: #ccc;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #333;
  cursor: pointer;
}

.slider-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-weight: bold;
}

.fade-project {
  opacity: 0;
  transition: opacity 1s ease;
}
.fade-project.show {
  opacity: 1;
}
</style>
</head>
<body>

<h1>Before/After Remodel</h1>

<div class="project-container fade-project show" id="project">
  <img src="after.jpg" id="afterImage" alt="After Remodel">
  <img src="before.jpg" id="beforeImage" alt="Before Remodel">
</div>

<div class="slider-labels">
  <span>Before</span>
  <span>After</span>
</div>

<input type="range" min="0" max="100" value="100" id="slider">

<script>
// Single project setup
let autoSlide = true;

const beforeImage = document.getElementById('beforeImage');
const afterImage = document.getElementById('afterImage');
const slider = document.getElementById('slider');
const projectDiv = document.getElementById('project');

// Slider control with resume trigger
slider.addEventListener('input', () => {
  const val = slider.value;
  beforeImage.style.width = val + "%";

  if (val < 100) {
    autoSlide = false; // pause while dragging
  } else if (val >= 100) {
    setTimeout(() => { autoSlide = true; }, 500); // resume 0.5s after fully revealed
  }
});

// Auto reveal function
function autoReveal() {
  if (!autoSlide) return;

  let val = 100; // start fully covering
  const step = 100 / (5*20); // 5 seconds, 50ms interval → 100 steps

  const interval = setInterval(() => {
    if (!autoSlide) { clearInterval(interval); return; }
    val -= step;
    if (val <= 0) {
      val = 0;
      clearInterval(interval);
      setTimeout(() => {
        // fade out and fade in again for repeat
        projectDiv.classList.remove('show');
        setTimeout(() => projectDiv.classList.add('show'), 500);
        // reset slider
        beforeImage.style.width = "100%";
        slider.value = 100;
      }, 1000);
    }
    slider.value = val;
    beforeImage.style.width = val + "%";
  }, 50);
}

// Start the slideshow
setInterval(autoReveal, 7000); // repeat every 7s (5s reveal + 2s buffer)
</script>

</body>
</html>
