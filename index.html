<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Project Remodel Portfolio</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  text-align: center;
  padding: 20px;
}

h1 { margin-bottom: 20px; }

.project-container {
  position: relative;
  max-width: 700px;
  margin: auto;
  overflow: hidden;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  height: 400px;
}

.project-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
}

#beforeImage {
  z-index: 2;
  width: 100%;
  transition: width 5s linear;
}

#afterImage { z-index: 1; }

input[type="range"] {
  width: 90%;
  margin-top: 10px;
  -webkit-appearance: none;
  height: 5px;
  border-radius: 5px;
  background: #ccc;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #333;
  cursor: pointer;
}

.slider-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-weight: bold;
}

.fade-project {
  opacity: 0;
  transition: opacity 1s ease;
}
.fade-project.show { opacity: 1; }
</style>
</head>
<body>

<h1>Multi-Project Remodel Portfolio</h1>

<div class="project-container fade-project show" id="project">
  <img src="project1-after.jpg" id="afterImage" alt="After Remodel">
  <img src="project1-before.jpg" id="beforeImage" alt="Before Remodel">
</div>

<div class="slider-labels">
  <span>Before</span>
  <span>After</span>
</div>

<input type="range" min="0" max="100" value="100" id="slider">

<script>
// --- Projects Configuration ---
const projects = [
  {before:"project1-before.jpg", after:"project1-after.jpg"},
  {before:"project2-before.jpg", after:"project2-after.jpg"},
  {before:"project3-before.jpg", after:"project3-after.jpg"}
];

let currentProject = 0;
let autoSlide = true;

// --- DOM Elements ---
const beforeImage = document.getElementById('beforeImage');
const afterImage = document.getElementById('afterImage');
const slider = document.getElementById('slider');
const projectDiv = document.getElementById('project');

// --- Slider control with resume trigger ---
slider.addEventListener('input', () => {
  const val = slider.value;
  beforeImage.style.width = val + "%";

  if (val < 100) {
    autoSlide = false;
  } else if (val >= 100) {
    setTimeout(() => { autoSlide = true; }, 500);
  }
});

// --- Show project immediately with After fully right ---
function showProject(index) {
  projectDiv.classList.remove('show');
  setTimeout(() => {
    beforeImage.src = projects[index].before;
    afterImage.src = projects[index].after;
    beforeImage.style.width = "100%"; // start fully covering
    slider.value = 100;
    projectDiv.classList.add('show');
    autoSlide = true;
  }, 500);
}

// --- Auto reveal per project ---
function autoReveal() {
  if (!autoSlide) return;

  // 1️⃣ Hold Before image for 5s
  setTimeout(() => {
    if (!autoSlide) return;

    // 2️⃣ Reveal After image over 5s
    beforeImage.style.width = "0%"; // slide to left

    // 3️⃣ Hold After fully revealed for 5s
    setTimeout(() => {
      if (!autoSlide) return;

      // 4️⃣ Fade out, then show next project
      projectDiv.classList.remove('show');
      setTimeout(() => {
        currentProject = (currentProject + 1) % projects.length;
        showProject(currentProject);
      }, 500); // fade duration
    }, 5000); // post-reveal hold
  }, 5000); // pre-reveal hold
}

// --- Start slideshow ---
showProject(currentProject);
setInterval(autoReveal, 16000); 
// total cycle = 5s Before + 5s reveal + 5s After hold + 1s fade
</script>

</body>
</html>
