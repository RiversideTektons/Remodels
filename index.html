<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Remodel Slider</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.slider-container {
  position: relative;
  max-width: 700px;
  margin: auto;
  overflow: hidden;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Both images stacked */
.slider-container img {
  width: 100%;
  display: block;
  position: absolute;
  top: 0;
  left: 0;
}

/* Top image (Before) */
#beforeImage {
  width: 100%; /* fully visible at start */
  z-index: 2;
}

/* Bottom image (After) stays full width behind */
#afterImage {
  z-index: 1;
}

.slider-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-weight: bold;
}

input[type="range"] {
  width: 100%;
  margin-top: 10px;
  -webkit-appearance: none;
  height: 5px;
  border-radius: 5px;
  background: #ccc;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #333;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Kitchen Remodel Reveal</h1>

<div class="slider-container" style="height: 400px; position: relative;">
  <img src="after.jpg" id="afterImage" alt="After Remodel">
  <img src="before.jpg" id="beforeImage" alt="Before Remodel">
</div>

<div class="slider-labels">
  <span>Before</span>
  <span>After</span>
</div>

<input type="range" min="0" max="100" value="100" id="slider">

<script>
const slider = document.getElementById('slider');
const beforeImage = document.getElementById('beforeImage');

slider.addEventListener('input', function() {
  beforeImage.style.width = slider.value + '%';
});
</script>

</body>
</html>
