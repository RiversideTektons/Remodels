<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

.container{
  position:relative;
  max-width:600px;
  margin:auto;
}

img{
  width:100%;
  display:block;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.slider{
  width:100%;
}

input[type=range]{
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Remodel Before / After</h2>

<div class="container">
  <img src="after.jpg">
  <div class="overlay" id="overlay">
    <img src="before.jpg">
  </div>
</div>

<input type="range" min="0" max="100" value="50" id="slider">

<script>
const slider = document.getElementById("slider");
const overlay = document.getElementById("overlay");

slider.addEventListener("input", function(){
  overlay.style.width = slider.value + "%";
});
</script>

</body>
</html>
